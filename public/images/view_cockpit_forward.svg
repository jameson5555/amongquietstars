<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-labelledby="title desc">
  <title id="title">Cockpit forward view</title>
  <desc id="desc">Forward cockpit illustration with large canopy window and matte top and bottom readout surfaces.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c2b3f"/>
      <stop offset="100%" stop-color="#07111d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#39475a"/>
      <stop offset="100%" stop-color="#111823"/>
    </linearGradient>
    <linearGradient id="windowFrame" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4b586c"/>
      <stop offset="12%" stop-color="#1d2634"/>
      <stop offset="100%" stop-color="#0d131d"/>
    </linearGradient>
    <radialGradient id="windowGlow" cx="50%" cy="30%" r="70%">
      <stop offset="0%" stop-color="#6fc9ff" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#091221" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stars" width="180" height="180" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="34" r="1.5" fill="#fff9db" opacity="0.8"/>
      <circle cx="96" cy="52" r="1.8" fill="#9be6ff" opacity="0.7"/>
      <circle cx="150" cy="28" r="1.2" fill="#ffffff" opacity="0.82"/>
      <circle cx="72" cy="130" r="1.3" fill="#ffe7ac" opacity="0.72"/>
      <circle cx="160" cy="142" r="1.5" fill="#ffffff" opacity="0.82"/>
    </pattern>
  </defs>
  <rect width="1600" height="1000" fill="url(#bg)"/>
  <rect width="1600" height="1000" fill="url(#windowGlow)"/>

  <path d="M280 80 C420 30 1180 30 1320 80 L1380 130 H220 Z" fill="#303b4a"/>
  <rect x="250" y="104" width="1100" height="138" rx="34" fill="url(#panel)"/>
  <rect x="280" y="134" width="1040" height="80" rx="24" fill="#0f1824" stroke="#8fe5ff" stroke-opacity="0.12"/>

  <path d="M420 250 H1180 C1260 250 1325 315 1325 395 V600 C1325 688 1253 760 1165 760 H435 C347 760 275 688 275 600 V395 C275 315 340 250 420 250 Z" fill="url(#windowFrame)"/>
  <path d="M470 286 H1130 C1187 286 1234 333 1234 390 V576 C1234 635 1186 684 1127 684 H473 C414 684 366 636 366 577 V390 C366 333 413 286 470 286 Z" fill="#09111f"/>
  <rect x="388" y="306" width="824" height="354" rx="86" fill="#0b1626"/>
  <rect x="388" y="306" width="824" height="354" rx="86" fill="url(#stars)" opacity="0.7"/>
  <ellipse cx="840" cy="458" rx="180" ry="140" fill="#1a406a" opacity="0.65"/>
  <ellipse cx="986" cy="370" rx="92" ry="70" fill="#f3d398" opacity="0.12"/>

  <rect x="210" y="742" width="1180" height="182" rx="42" fill="url(#panel)"/>
  <rect x="230" y="762" width="760" height="142" rx="28" fill="#0d1722" stroke="#8fe5ff" stroke-opacity="0.16"/>
  <rect x="1018" y="762" width="352" height="142" rx="28" fill="#0d1722" stroke="#8fe5ff" stroke-opacity="0.16"/>

  <path d="M180 910 C420 830 1180 830 1420 910 V1000 H180 Z" fill="#0a121b"/>
  <path d="M330 770 L330 690" stroke="#f4d59a" stroke-opacity="0.12" stroke-width="8" stroke-linecap="round"/>
  <path d="M1270 770 L1270 690" stroke="#f4d59a" stroke-opacity="0.12" stroke-width="8" stroke-linecap="round"/>
</svg>
